volumes:
  pg_data:
  static:
  media:

services:
  db:
    image: postgres:13.10
    env_file: .env
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: always

  backend:
    image: theacidonly/billiard_backend:latest
    env_file: .env
    volumes:
      - static:/backend_static
      - ./data:/app/data
      - media:/app/media
    depends_on:
      - db
    restart: always

  frontend:
    image: theacidonly/billiard_frontend:latest
    env_file: .env
    command: cp -r /app/dist/. /frontend_static/
    volumes:
      - static:/frontend_static
    restart: "no"

  gateway:
    image: theacidonly/billiard_gateway:latest
    env_file: .env
    volumes:
      - static:/staticfiles/
      - media:/media
      - ./docs:/usr/share/nginx/html/api/docs:ro
    ports:
      - 8080:80
    depends_on:
      - backend
      - frontend
    restart: always
